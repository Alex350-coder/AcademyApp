spring:
  application:
    name: academic-saas
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/academic_saas}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: redis
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: NATIVE
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  email:
    provider: log
    from-email: noreply@academiasaas.com
  storage:
    provider: local
    local:
      path: ./uploads

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.academicsaas: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
